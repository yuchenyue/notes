<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ if .IsHome }}home{{ else if and (eq .Kind "page") (not .IsHome) }}single{{ else }}list{{ end }}">
  {{ if not (and (eq .Kind "page") (not .IsHome)) }}
  <header class="site-header">
    <div class="container">
      {{ partial "header.html" . }}
    </div>
  </header>
  {{ end }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ if not (and (eq .Kind "page") (not .IsHome)) }}
  <footer class="site-footer">
    {{ partial "footer.html" . }}
  </footer>
  {{ end }}
</body>
</html>
