baseURL = 'https://example.org/'
locale = 'en-US'
title = 'My New Hugo Project'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 30

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'

# Theme example params - you can copy these into your site config to override defaults
[params]
# If your site is served under a subpath (e.g. example.org/notes/), set homeURL to that path
# Example (in your site config):
# [params]
#   homeURL = "/notes/"
# If not set, the header will fallback to the site's root (relLangURL "/").
  homeURL = "/"
